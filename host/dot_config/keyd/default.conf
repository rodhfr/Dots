[ids]
*

[systemcontrol]
# pause
p = f10 
# leftclick
a = leftmouse
d = rightmouse

[main]
esc = overload(esclayer, esc)
capslock = overload(capslock, esc)
leftalt = layer(meta)
#rightalt = overload(alt, oneshot(accent))
#rightalt = overload(compose, alt)

[esclayer]
o = macro(print\("\\n:"\) left left left)
p = macro(print\(\) left)
t = macro(~)

[capslock]
include capslock
include env

[accent]
#a = z
#d = rightmouse
; = macro(compose c ,)
leftbrace = oneshot(acute_accent)
apostrophe = oneshot(tilde)

[acute_accent]
g = macro("acute_accent")
a = macro(compose a ')
e = macro(compose e ')
i = macro(compose i ')
o = macro(compose o ')
u = macro(compose u ')
shift = layer(grave)
[grave]
a = macro(compose a `)

[tilde]
a = macro(compose a ~)
o = macro(compose o ~)
shift = oneshot(caret)
[caret]
o = macro(compose o ^)
a = macro(compose a ^)
e = macro(compose e ^)
i = macro(compose i ^)


